<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>靜態網站</title><link rel="stylesheet" href="style.css"></head><body data-page="9"><main class="slide"><div class="top"><span>02｜HTML 的角色</span><button data-fullscreen>全螢幕</button></div><section class="content"><h2>什麼是<span class="accent">靜態網站</span>？</h2><p class="lead">伺服器將準備好的檔案直接交給每位訪客；通常每個人看到的內容相同。</p><div class="grid"><div class="card"><h3>內容固定</h3><p>更新內容時，需要修改 HTML、CSS 或 JavaScript 檔案。</p></div><div class="card"><h3>快速簡單</h3><p>不需要資料庫，也不需要處理複雜帳號資料。</p></div><div class="card"><h3>常見用途</h3><p>作品集、活動頁、公司介紹與 Landing Page。</p></div></div></section></main><footer class="footer"><button data-prev>上一頁</button><span>09 / 15</span><button class="next" data-next>下一頁</button></footer><script src="script.js"></script></body></html>
