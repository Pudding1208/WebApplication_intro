<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>登入流程</title><link rel="stylesheet" href="style.css"></head><body data-page="14"><main class="slide"><div class="top"><span>04｜系統如何一起運作</span><button data-fullscreen>全螢幕</button></div><section class="content"><h2>一次登入，系統做了哪些事情？</h2><div data-switcher class="choice-row"><button class="active" data-target="success">情境 A：登入成功</button><button data-target="fail">情境 B：密碼錯誤</button></div><div class="state active" data-state="success"><div class="flow"><div class="card"><h3>使用者</h3><p>輸入帳號密碼</p></div><div class="card"><h3 class="front">前端</h3><p>送出表單資料</p></div><div class="card"><h3 class="back">後端</h3><p>驗證帳密</p></div><div class="card"><h3 class="db">資料庫</h3><p>查詢使用者</p></div></div><p class="lead">驗證成功，後端回傳結果，前端導向會員首頁。</p></div><div class="state" data-state="fail"><div class="card"><h3 class="back">驗證失敗</h3><p>後端比對資料後回傳錯誤；前端顯示「帳號或密碼錯誤」。這是教學用前端模擬，並未連線到真正系統。</p></div></div></section></main><footer class="footer"><button data-prev>上一頁</button><span>14 / 15</span><button class="next" data-next>下一頁</button></footer><script src="script.js"></script></body></html>
